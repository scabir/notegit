name: Website Pages

on:
  push:
    branches:
      - main
    paths:
      - "app/website/**"
      - ".github/workflows/website-pages.yml"
  pull_request:
    paths:
      - "app/website/**"
      - ".github/workflows/website-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: website-pages
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build Website Artifact
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.0
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: app/website/pnpm-lock.yaml

      - name: Install website dependencies
        working-directory: app/website
        run: |
          corepack enable
          pnpm install --frozen-lockfile

      - name: Build website
        working-directory: app/website
        run: pnpm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: app/website/dist

  deploy:
    name: Deploy Website
    runs-on: ubuntu-latest
    needs: build
    if: ${{ github.event_name != 'pull_request' }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
